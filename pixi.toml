[workspace]
authors = ["Faith Adegoke <adegokefaith22@gmail.com>"]
channels = ["conda-forge"]
name = "code_R_analysis"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
setup-r-pkgs = "Rscript -e \"install.packages('rdflib', repos='https://cloud.r-project.org')\""

[dependencies]
r-dplyr = ">=1.2.1,<2"
r-tidyr = ">=1.3.2,<2"
r-stringr = ">=1.6.0,<2"
r-jsonlite = ">=2.0.0,<3"
r-ggplot2 = ">=4.0.2,<5"
r-ggvenndiagram = ">=1.5.7,<2"
r-gridextra = ">=2.3,<3"
r-tidyverse = ">=2.0.0,<3"
r-rcolorbrewer = ">=1.1_3,<2"
r-ggpattern = ">=1.3.1,<2"
r-eulerr = ">=7.0.4,<8"
r-reactable = ">=0.4.5,<0.5"
r-cairo = ">=1.7_0,<2"
r-ggalluvial = ">=0.12.6,<0.13"
r-cowplot = ">=1.2.0,<2"
r-scales = ">=1.4.0,<2"
r-ggbreak = ">=0.1.7,<0.2"
r-svglite = ">=2.2.2,<3"
